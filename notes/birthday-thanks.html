<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special Birthday Giveaway! 🎉</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            padding: 40px;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: #333;
        }
        h1 { font-size: 2.8em; color: #e74c3c; }
        .prank {
            font-size: 1.4em;
            margin: 30px auto;
            max-width: 700px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .reveal {
            color: #27ae60;
            font-size: 2em;
            margin: 40px 0;
        }
        button {
            padding: 15px 30px;
            font-size: 1.2em;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>🎉 😂 GOT YOU!! 🎂</h1>
    
    <div class="prank">
        <p style="font-size: 1.6em;">Thank you all so much for the warm birthday wishes yesterday!</p>
        <p style="font-size: 1.8em; color: #e74c3c;"> 
    </div>

    <div id="reveal" class="reveal" style="display: none;">
        <h1>Did you just click a spam link? 😈</h1>
        <p style="font-size: 1.5em;">No free laptops... but thank you again for all the love and wishes ❤️</p>
        <p>— Iska Nyunja</p>
    </div>

    <script>
        function revealPrank() {
            document.querySelector('.prank').style.display = 'none';
            document.getElementById('reveal').style.display = 'block';
        }
    </script>
</body>
</html>
